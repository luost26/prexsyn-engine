[workspace]
authors = ["Shitong Luo <luost26@gmail.com>"]
channels = ["conda-forge"]
name = "prexsyn-engine"
platforms = ["linux-64"]

[dependencies]
cmake = ">=4.2.3,<5"
ninja = ">=1.13.2,<2"

python = ">=3.10,<3.14"
pip = "*"
setuptools = "*"
scikit-build-core = ">=0.11.6"
python-build = "*"
auditwheel = "*"
patchelf = "*"
pytest = "*"
mypy = "*"
pre-commit = ">=4.5.1,<5"
bump-my-version = "*"

[pypi-dependencies]
numpy = ">=2.4.2,<3"
click = "*"
tqdm = "*"
rdkit = ">=2025.9.6"
jupyterlab = "*"
ipywidgets = "*"
pandas = "*"

[feature.dev-linux-64.dependencies]
clangxx = "==21.1.0"
llvm-openmp = "==21.1.0"
clang-tools = "==21.1.0"
llvm-tools = "==21.1.0"
compiler-rt = "==21.1.0"
libstdcxx-ng = ">=15.0.0"

[tasks]
build-python = { cmd = "python -m build" }

[feature.dev-linux-64.tasks]
clean-third-party = { cmd = "./clean.sh", cwd = "third_party" }
install-boost = { cmd = "./boost.sh $(pwd)/pkgs", cwd = "third_party" }
install-rdkit = { cmd = "./rdkit.sh $(pwd)/pkgs", cwd = "third_party" }

configure-debug = { cmd = "cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -G Ninja -S . -B build/debug && ln -sf ./debug/compile_commands.json build/compile_commands.json" }
configure-release = { cmd = "cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -G Ninja -S . -B build/release" }
configure = [ { task = "configure-debug" }, { task = "configure-release" } ]
build-debug = { cmd = "ninja -C build/debug/" }
build-release = { cmd = "ninja -C build/release/" }
build = [ { task = "build-debug" }, { task = "build-release" } ]
test = { cmd = "ctest --output-on-failure --test-dir build/debug", depends-on = ["build-debug"] }

pyinstall = { cmd = "pip install -e . --no-build-isolation -v" }
test-py = { cmd = "pytest tests/", depends-on = ["pyinstall"] }
mkstubs = { cmd = "./scripts/mkstubs.sh", depends-on = ["pyinstall"] }

pyinstall-debug = { cmd = "pip install -e . --no-build-isolation --config-settings=cmake.build-type=Debug -v"}
python-asan = { cmd = "python", env = { LD_PRELOAD = "$(clang -print-file-name=libclang_rt.asan-x86_64.so)" }, depends-on = ["pyinstall-debug"] }
test-py-debug = { cmd = "pytest tests/", env = { LD_PRELOAD = "$(clang -print-file-name=libclang_rt.asan-x86_64.so)" }, depends-on = ["pyinstall-debug"] }

[feature.dev-linux-64.activation.env]
LD_LIBRARY_PATH = "${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH}"
ASAN_SYMBOLIZER_PATH = "${CONDA_PREFIX}/bin/llvm-symbolizer"
CXX = "${CONDA_PREFIX}/bin/clang++"
CC = "${CONDA_PREFIX}/bin/clang"
BOOST_TOOLSET = "clang"

[environments]
dev-linux-64 = { features = ["dev-linux-64"] }
