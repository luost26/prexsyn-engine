name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Stamp build version
        if: github.event_name != 'release'
        run: >-
          python .github/set_build_version.py --pyproject pyproject.toml --build-number "${{ github.run_number }}"
      - name: Cache third-party deps
        uses: actions/cache@v5
        with:
          path: .cache/third_party
          key: ${{ runner.os }}-third-party-${{ hashFiles('CMakeLists.txt', 'third_party/boost.sh', 'third_party/rdkit.sh') }}
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_BEFORE_ALL_LINUX: >-
            mkdir -p /host${{ github.workspace }}/.cache/third_party && mkdir -p /project/build/scikit-build && rm -rf /project/build/scikit-build/_third_party && ln -s /host${{ github.workspace }}/.cache/third_party /project/build/scikit-build/_third_party
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
  make_sdist:
    name: Make SDist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Build SDist
        run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz
  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    needs: [build_wheels, make_sdist]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: cibw-*
          merge-multiple: true
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
  publish_pages:
    name: Publish private PyPI index
    runs-on: ubuntu-latest
    needs: [build_wheels]
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v5
        with:
          path: site/simple/prexsyn-engine
          pattern: cibw-wheels-*
          merge-multiple: true
      - name: Build simple index
        run: python .github/generate_simple_index.py --wheels site/simple/prexsyn-engine --output site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
