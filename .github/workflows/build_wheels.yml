name: Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Restore third-party deps
        id: cache-third-party-restore
        uses: actions/cache/restore@v5
        with:
          path: /project/build/scikit-build/_third_party
          key: ${{ runner.os }}-third-party-${{ hashFiles('CMakeLists.txt', 'third_party/boost.sh', 'third_party/rdkit.sh') }}
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
      - name: Save third-party deps
        id: cache-third-party-save
        uses: actions/cache/save@v5
        with:
          path: /project/build/scikit-build/_third_party
          key: ${{ steps.cache-third-party-restore.outputs.cache-primary-key }}
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
